<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Autoware CI Metrics</title>
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
      #repo-swimlane-chart { width: 100%; height: 380px; }
      #health-check-time-chart,
      #docker-build-and-push-time-chart,
      #docker-chart-compressed,
      #docker-chart-uncompressed { width: 100%; height: 500px; }
    </style>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-fluid px-4">
      <h1>Autoware CI Metrics</h1>

      <p>
        <a href="https://github.com/autowarefoundation/autoware-ci-metrics">
          https://github.com/autowarefoundation/autoware-ci-metrics
        </a>
      </p>

      <div class="btn-group mb-3" role="group" aria-label="Time window">
        <button type="button" class="btn btn-outline-primary" data-duration="1d">1d</button>
        <button type="button" class="btn btn-outline-primary active" data-duration="7d">7d</button>
        <button type="button" class="btn btn-outline-primary" data-duration="30d">30d</button>
        <button type="button" class="btn btn-outline-primary" data-duration="90d">90d</button>
        <button type="button" class="btn btn-outline-primary" data-duration="1y">1y</button>
        <button type="button" class="btn btn-outline-primary" data-duration="all">All</button>
      </div>

      <h2>Critical workflow runs (push to main)</h2>
      <div id="repo-swimlane-chart"></div>

      <h2>Docker image sizes (uncompressed)</h2>
      <div id="docker-chart-uncompressed"></div>

      <h2>Docker image sizes (compressed)</h2>
      <div id="docker-chart-compressed"></div>

      <h2>docker-build-and-push execution times</h2>
      <div id="docker-build-and-push-time-chart"></div>

      <h2>health-check execution times</h2>
      <div id="health-check-time-chart"></div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
