---
name: docker-image-size

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-digests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed-tags: ${{ steps.check.outputs.changed-tags }}
      should-measure: ${{ steps.check.outputs.should-measure }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout data branch
        uses: actions/checkout@v6
        with:
          ref: data-storage
          path: data-storage

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Check upstream digests
        id: check
        run: |
          python scripts/check_image_digests.py \
            --data-dir data-storage \
            --github-token ${{ github.token }}

  measure:
    needs: check-digests
    if: ${{ needs.check-digests.outputs.should-measure == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          set-host: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository (main)
        uses: actions/checkout@v6

      - name: Configure Git user's name and email
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Checkout data branch
        uses: actions/checkout@v6
        with:
          ref: data-storage
          path: data-storage

      - name: Check available disk space
        id: disk-space
        run: |
          df -h /
          avail_gb=$(df --output=avail / | tail -1 | awk '{printf "%d", $1/1024/1024}')
          echo "available_gb=$avail_gb" >> "$GITHUB_OUTPUT"

      - name: Free Disk Space (Ubuntu)
        if: steps.disk-space.outputs.available_gb < 80
        uses: jlumbroso/free-disk-space@main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Execute script
        run: |
          python scripts/docker_image_size.py \
            --output-dir data-storage \
            --github-token ${{ github.token }} \
            --tags "${{ needs.check-digests.outputs.changed-tags }}" \
            --allow-pruning-images

      - name: Disk space and image sizes after script
        run: |
          df -h /
          docker image ls
          docker version

      - name: Commit and push new docker image data
        run: |
          cd data-storage
          python ../scripts/check_new_data.py . --commit \
            --message "chore(data): append new docker image size measurements"
          git pull --rebase origin data-storage
          git push origin data-storage
